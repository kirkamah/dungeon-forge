<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="theme-color" content="#0e0e1a" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/png" href="/Logo_Dungeon_Forge.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=MedievalSharp&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <title>Dungeon Forge</title>
    <style>
      html, body, #root {
        background: #0e0e1a !important;
        margin: 0;
        height: 100%;
        color: #e8e0c8;
        overflow: hidden;
      }
      html {
        color-scheme: dark;
      }
    </style>
    <script>
      // Suppress browser context menu app-wide (preserves a real-app feel).
      window.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
