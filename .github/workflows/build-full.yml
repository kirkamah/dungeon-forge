name: Build full (Boosty)

# Builds the FULL (non-trial) macOS apps (Intel + Apple Silicon) and uploads
# them as workflow ARTIFACTS for manual upload to Boosty. The full Windows
# installer already exists; this covers macOS. Run manually.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build full macOS (Intel + Apple Silicon)
        run: |
          npm run build
          npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: dungeon-forge-mac
          path: release/*.zip
          if-no-files-found: error
